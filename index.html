        ];

        const categories = [...new Set(allLocations.map(loc => loc.kategori))];
        const filterSelect = document.getElementById('categoryFilter');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            filterSelect.appendChild(opt);
        });

        function displayMarkers(locations) {
            markers.clearLayers();
            locations.forEach(loc => {
                const popupMarkup = `
                    <div class="popup-content">
                        <h3>${loc.isim}</h3>
                        <span class="category-badge">${loc.kategori}</span>
                        <img src="${loc.gorsel}" alt="${loc.isim}">
                        <p>${loc.aciklama}</p>
                    </div>
                `;
                const marker = L.marker([loc.enlem, loc.boylam]).bindPopup(popupMarkup);
                markers.addLayer(marker);
            });
        }

        displayMarkers(allLocations);

        filterSelect.addEventListener('change', function(e) {
            const selected = e.target.value;
            if (selected === 'all') {
                displayMarkers(allLocations);
            } else {
                const filtered = allLocations.filter(loc => loc.kategori === selected);
                displayMarkers(filtered);
            }
        });
    </script>
